{% extends 'base.html' %}
{% block title %}Add Flat — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Add Flat</h2>
            <p class="page-header-subtitle">Add a new flat to the society</p>
        </div>
        <a href="{% url 'admin_flat_list' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div class="card-header">
            <div class="card-title">🏢 Flat Details</div>
        </div>
        <form method="post">
            {% csrf_token %}

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div class="form-group">
                    <label class="form-label">Flat Number <span style="color:#EF4444;">*</span></label>
                    <input type="text" name="flat_number" class="form-control" placeholder="e.g. 101" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Floor <span style="color:#EF4444;">*</span></label>
                    <input type="number" name="floor" class="form-control" placeholder="e.g. 1" min="0" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Society <span style="color:#EF4444;">*</span></label>
                <select name="society" class="form-control" required>
                    <option value="">-- Select Society --</option>
                    {% for s in societies %}
                    <option value="{{ s.pk }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="card-footer">
                <a href="{% url 'admin_flat_list' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Flat</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
