{% extends 'base.html' %}
{% block title %}Add Due — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Add Maintenance Due</h2>
            <p class="page-header-subtitle">Add monthly maintenance due for a resident</p>
        </div>
        <a href="{% url 'admin_financial' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div class="card-header">
            <div class="card-title">💰 Due Details</div>
        </div>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Resident <span style="color:#EF4444;">*</span></label>
                <select name="resident" class="form-control" required>
                    <option value="">-- Select Resident --</option>
                    {% for r in residents %}
                    <option value="{{ r.pk }}">
                        {{ r.user.first_name }} {{ r.user.last_name }}
                        {% if r.flat %} — Flat {{ r.flat.flat_number }}{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Month <span style="color:#EF4444;">*</span></label>
                <input type="text" name="month" class="form-control"
                    placeholder="e.g. March 2026" required/>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div class="form-group">
                    <label class="form-label">Amount (₹) <span style="color:#EF4444;">*</span></label>
                    <input type="number" name="amount" class="form-control"
                        placeholder="e.g. 2000" min="0" step="0.01" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Due Date <span style="color:#EF4444;">*</span></label>
                    <input type="date" name="due_date" class="form-control" required/>
                </div>
            </div>

            <div class="card-footer">
                <a href="{% url 'admin_financial' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Due</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
