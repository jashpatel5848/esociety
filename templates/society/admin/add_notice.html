{% extends 'base.html' %}
{% block title %}Add Notice — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Post Notice</h2>
            <p class="page-header-subtitle">Post a new notice to all residents</p>
        </div>
        <a href="{% url 'admin_notice_list' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:600px;">
        <div class="card-header">
            <div class="card-title">📢 Notice Details</div>
        </div>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Society <span style="color:#EF4444;">*</span></label>
                <select name="society" class="form-control" required>
                    <option value="">-- Select Society --</option>
                    {% for s in societies %}
                    <option value="{{ s.pk }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Title <span style="color:#EF4444;">*</span></label>
                <input type="text" name="title" class="form-control"
                    placeholder="e.g. Water Supply Disruption" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Notice Type <span style="color:#EF4444;">*</span></label>
                <select name="notice_type" class="form-control" required>
                    <option value="general">General</option>
                    <option value="event">Event</option>
                    <option value="meeting">Meeting</option>
                    <option value="emergency">Emergency</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Content <span style="color:#EF4444;">*</span></label>
                <textarea name="content" class="form-control" rows="5"
                    placeholder="Write notice content here..." required></textarea>
            </div>

            <div class="card-footer">
                <a href="{% url 'admin_notice_list' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Post Notice</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
