<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
{% csrf_token %}
<button id="rzp-button1">PAY NOW</button>

<script>
document.getElementById("rzp-button1").onclick = async function(e) {
    e.preventDefault();
    try {
        const csrfTokenElement = document.querySelector('[name=csrfmiddlewaretoken]');
        if (!csrfTokenElement) {
            alert("CSRF Token not found in the page!");
            return;
        }
        const csrfToken = csrfTokenElement.value;
        console.log("Creating order...");

        // 1. call your Django view to create the order
        const response = await fetch("/society/create-order/", {
            method: "POST",
            headers: {
                "X-CSRFToken": csrfToken,
                "Content-Type": "application/json"
            }
        }); 

        if (!response.ok) {
            const errorText = await response.text();
            console.error("Server Error:", errorText);
            alert("Failed to create order. Check console for details. Status: " + response.status);
            return;
        }

        const orderData = await response.json();
        console.log("Order Data:", orderData);

        // 2. setup razorpay options using data from your backend
        var options = {
            "key": "rzp_test_Sabuhwd8z6gOZE",
            "amount": orderData.amount,
            "currency": orderData.currency,
            "name": "green park society",
            "description": "maintenance charges",
            "order_id": orderData.id,
            "handler": async function (response) {
                // Submit using FormData so request.POST works in Django
                const formData = new FormData();
                formData.append("razorpay_payment_id", response.razorpay_payment_id);
                formData.append("razorpay_order_id", response.razorpay_order_id);
                formData.append("razorpay_signature", response.razorpay_signature);

                const verifyResponse = await fetch("/society/verify-payment/", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": csrfToken
                    },
                    body: formData
                });
                const verifyData = await verifyResponse.json();
                console.log(verifyData);
                
                if (verifyData.status === "success") {
                    // Alert success and reload page to close checkout flow
                    alert("Payment Success!");
                    window.location.reload();
                } else {
                    alert("Payment verification failed! Check console.");
                }
            },
            "prefill": {
                "name": "customer name",
                "email": "customer@gmail.com"
            },
            "theme": {
                "color": "#3399cc"
            }
        };

        var rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', function (response){
            alert("Payment Failed: " + response.error.description);
        });
        rzp1.open();

    } catch (error) {
        console.error("Error creating payment:", error);
        alert("An error occurred. Check browser console.");
    }
};
</script>
