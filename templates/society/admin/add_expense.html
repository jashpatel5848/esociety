{% extends 'base.html' %}
{% block title %}Add Expense — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Add Expense</h2>
            <p class="page-header-subtitle">Record a new society expense</p>
        </div>
        <a href="{% url 'admin_financial' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div class="card-header">
            <div class="card-title">📊 Expense Details</div>
        </div>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Society <span style="color:#EF4444;">*</span></label>
                <select name="society" class="form-control" required>
                    <option value="">-- Select Society --</option>
                    {% for s in societies %}
                    <option value="{{ s.pk }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Title <span style="color:#EF4444;">*</span></label>
                <input type="text" name="title" class="form-control"
                    placeholder="e.g. Lift Maintenance" required/>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div class="form-group">
                    <label class="form-label">Category <span style="color:#EF4444;">*</span></label>
                    <select name="category" class="form-control" required>
                        <option value="maintenance">Maintenance</option>
                        <option value="salary">Salary</option>
                        <option value="utility">Utility</option>
                        <option value="repair">Repair</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (₹) <span style="color:#EF4444;">*</span></label>
                    <input type="number" name="amount" class="form-control"
                        placeholder="e.g. 5000" min="0" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Date <span style="color:#EF4444;">*</span></label>
                <input type="date" name="date" class="form-control" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"
                    placeholder="Optional details..."></textarea>
            </div>

            <div class="card-footer">
                <a href="{% url 'admin_financial' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Expense</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
