{% extends 'base.html' %}
{% block title %}Add Facility — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Add Facility</h2>
            <p class="page-header-subtitle">Add a new amenity to the society</p>
        </div>
        <a href="{% url 'admin_facility_list' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div class="card-header">
            <div class="card-title">🏢 Facility Details</div>
        </div>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Society <span style="color:#EF4444;">*</span></label>
                <select name="society" class="form-control" required>
                    <option value="">-- Select Society --</option>
                    {% for s in societies %}
                    <option value="{{ s.pk }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Facility Name <span style="color:#EF4444;">*</span></label>
                <input type="text" name="name" class="form-control"
                    placeholder="e.g. Gymnasium, Swimming Pool" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"
                    placeholder="Brief description of the facility..."></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div class="form-group">
                    <label class="form-label">Capacity <span style="color:#EF4444;">*</span></label>
                    <input type="number" name="capacity" class="form-control"
                        placeholder="e.g. 20" min="1" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹) <span style="color:#EF4444;">*</span></label>
                    <input type="number" name="price" class="form-control"
                        placeholder="e.g. 500" min="0" required/>
                </div>
            </div>

            <div class="card-footer">
                <a href="{% url 'admin_facility_list' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Facility</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
