{% extends 'base.html' %}
{% block title %}Raise Complaint — e-Society{% endblock %}

{% block content %}
<div class="page-body">

    <div class="page-header">
        <div>
            <h2 class="page-header-title">Raise Complaint</h2>
            <p class="page-header-subtitle">Report an issue to society management</p>
        </div>
        <a href="{% url 'resident_complaint_list' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <div class="card" style="max-width:560px;">
        <div class="card-header">
            <div class="card-title">🔧 Complaint Details</div>
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Title <span style="color:#EF4444;">*</span></label>
                <input type="text" name="title" class="form-control"
                    placeholder="e.g. Water leakage in bathroom" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Category <span style="color:#EF4444;">*</span></label>
                <select name="category" class="form-control" required>
                    <option value="plumbing">Plumbing</option>
                    <option value="electrical">Electrical</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="security">Security</option>
                    <option value="lift">Lift</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Description <span style="color:#EF4444;">*</span></label>
                <textarea name="description" class="form-control" rows="4"
                    placeholder="Describe the issue in detail..." required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Attach Image (Optional)</label>
                <input type="file" name="image" class="form-control" accept="image/*"/>
                <div class="form-hint">Upload a photo of the issue if available</div>
            </div>

            <div class="card-footer">
                <a href="{% url 'resident_complaint_list' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Complaint</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
