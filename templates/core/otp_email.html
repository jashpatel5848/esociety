<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Verify your eSociety Account</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6fa; margin: 0; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <h2 style="color: #0f172a; margin-bottom: 20px;">Verify your eSociety Account</h2>
        <p style="color: #475569; font-size: 16px;">Hello,</p>
        <p style="color: #475569; font-size: 16px;">Thank you for registering at e-Society! Please use the following 6-digit OTP to complete your registration:</p>
        
        <div style="margin: 30px 0; padding: 15px; background: #1e6ff1; color: #ffffff; font-size: 24px; font-weight: bold; border-radius: 8px; letter-spacing: 5px;">
            {{ otp }}
        </div>
        
        <p style="color: #475569; font-size: 14px;">If you did not request this, please ignore this email.</p>
    </div>
</body>
</html>
